name: C API Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        default: c-api-v0.1.0
  push:
    tags:
      - "c-api-v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: vulkan
            lib: libzipvoice_capi.so
            archive: tar.gz
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            features: vulkan
            lib: libzipvoice_capi.so
            archive: tar.gz
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            features: metal
            lib: libzipvoice_capi.dylib
            archive: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            features: vulkan
            lib: zipvoice_capi.dll
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: lukka/get-cmake@latest

      - name: Install Linux Vulkan SDK packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools glslc libvulkan-dev ninja-build spirv-headers spirv-tools

      - name: Install Windows Vulkan SDK
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          $roots = @("${env:ProgramFiles}\VulkanSDK", "C:\VulkanSDK")
          $sdk = $roots |
            Where-Object { Test-Path $_ } |
            ForEach-Object { Get-ChildItem $_ -Directory } |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $sdk) {
            throw "Vulkan SDK directory not found"
          }
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "$($sdk.FullName)\Lib" | Out-File -FilePath $env:GITHUB_PATH -Append
          "CARGO_TARGET_DIR=D:/t" | Out-File -FilePath $env:GITHUB_ENV -Append
          & "$($sdk.FullName)\Bin\glslc.exe" --version

      - name: Build C API
        run: cargo build --release -p zipvoice-capi --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          pkg="zipvoice-capi-${{ matrix.name }}"
          mkdir -p "dist/$pkg/include" "dist/$pkg/lib"
          cp crates/zipvoice-capi/include/zipvoice.h "dist/$pkg/include/"
          cp "target/${{ matrix.target }}/release/${{ matrix.lib }}" "dist/$pkg/lib/"
          tar -C dist -czf "dist/$pkg.tar.gz" "$pkg"

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "zipvoice-capi-${{ matrix.name }}"
          $targetDir = if ($env:CARGO_TARGET_DIR) { $env:CARGO_TARGET_DIR } else { "target" }
          New-Item -ItemType Directory -Force -Path "dist/$pkg/include", "dist/$pkg/lib" | Out-Null
          Copy-Item crates/zipvoice-capi/include/zipvoice.h "dist/$pkg/include/"
          Copy-Item "$targetDir/${{ matrix.target }}/release/${{ matrix.lib }}" "dist/$pkg/lib/"
          Copy-Item "$targetDir/${{ matrix.target }}/release/zipvoice_capi.dll.lib" "dist/$pkg/lib/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/$pkg" -DestinationPath "dist/$pkg.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: zipvoice-capi-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ZipVoice C API ${{ steps.tag.outputs.tag }}
          files: dist/*
